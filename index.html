<!DOCTYPE html>
<html>
<head>
    <title>Bad Apple!!</title>
    <style>
        body { margin: 0; padding: 0; background: black; display: flex; justify-content: center; align-items: center; height: 100vh; }
        video { width: 100%; max-width: 800px; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            color: white; font-family: sans-serif; cursor: pointer;
            background: rgba(0,0,0,0.5); z-index: 10;
        }
    </style>
</head>
<body>

    <!-- This overlay forces the user to click once, which "unlocks" the audio -->
    <div id="overlay" onclick="enableAudio()">
        <h1>Click anywhere to play with sound</h1>
    </div>

    <video id="vid" autoplay loop muted playsinline>
        <source src="badapple.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <script>
        function enableAudio() {
            var video = document.getElementById("vid");
            var overlay = document.getElementById("overlay");
            
            // Unmute the video
            video.muted = false;
            
            // Hide the click overlay
            overlay.style.display = "none";
        }
    </script>
</body>
</html>
