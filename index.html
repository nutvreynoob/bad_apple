<!DOCTYPE html>
<html>
<head>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: black; overflow: hidden; }
        
        /* This keeps the video filling the screen */
        #vid { width: 100vw; height: 100vh; object-fit: contain; }

        /* The cover screen */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: black; color: white; cursor: pointer;
            z-index: 100; font-family: sans-serif;
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="startExperience()">
        <h1>Click anywhere to play Bad Apple!!</h1>
    </div>

    <video id="vid" loop playsinline>
        <source src="badapple.mp4" type="video/mp4">
    </video>

    <script>
        function startExperience() {
            var video = document.getElementById("vid");
            var overlay = document.getElementById("overlay");
            
            // Start the video and unmute it
            video.play();
            video.muted = false;
            
            // Remove the overlay from view
            overlay.style.display = "none";
        }
    </script>
</body>
</html>
