<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bad Apple!!</title>
    <meta name="theme-color" content="#000000">

    <!-- Discord Embed Meta Tags -->
    <meta property="og:title" content="Bad Apple!!">
    <meta property="og:description" content="Playing Bad Apple">
    <meta property="og:type" content="video.other">
    
    <!-- Video and Image links updated with 'bad_apple' -->
    <meta property="og:video" content="https://nutvreynoob.github.io/bad_apple/badapple.mp4">
    <meta property="og:video:type" content="video/mp4">
    <meta property="og:video:width" content="1280">
    <meta property="og:video:height" content="720">
    
    <meta property="og:image" content="https://nutvreynoob.github.io/bad_apple/thumbnail.jpg">

    <style>
        body {
            margin: 0;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        video {
            max-width: 100%;
            max-height: 100%;
            pointer-events: none; /* Prevents users from right-clicking or interacting with the video */
        }
    </style>
</head>
<body>

    <!-- Slider (controls) removed. Muted, autoplay, and loop added. -->
    <video id="myVideo" autoplay loop muted playsinline>
  <source src="badapple.mp4" type="video/mp4">
</video>
<button onclick="document.getElementById('myVideo').muted = false;">Enable Sound</button>

</body>
</html>
