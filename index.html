<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bad Apple!!</title>
    <meta name="theme-color" content="#000000">

    <!-- Discord Embed Meta Tags -->
    <meta property="og:title" content="Bad Apple!!">
    <meta property="og:description" content="Playing Bad Apple">
    <meta property="og:type" content="video.other">
    
    <!-- This creates the playable embed in Discord -->
    <meta property="og:video" content="https://nutvreynoob.github.io/badapple/badapple.mp4">
    <meta property="og:video:type" content="video/mp4">
    <meta property="og:video:width" content="1280">
    <meta property="og:video:height" content="720">
    
    <!-- The thumbnail that shows before clicking play -->
    <meta property="og:image" content="https://nutvreynoob.github.io/badapple/thumbnail.jpg">

    <style>
        body {
            margin: 0;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        video {
            max-width: 100%;
            max-height: 100%;
        }
    </style>
</head>
<body>

    <!-- The video that plays when you visit the actual website -->
    <video controls autoplay loop>
        <source src="badapple.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

</body>
</html>
